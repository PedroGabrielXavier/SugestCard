<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BodinhaSugere 🐐</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --marrom:  #5C2A0E; --laranja: #C95C1E; --amarelo: #E8A83E;
      --creme:   #FDF3E3; --off:     #F5E9D5; --verde:   #2E6B3A;
      --text:    #2D1A0A; --muted:   #8B6240; --radius:  18px;
      --shadow:  0 8px 32px rgba(92,42,14,.22);
    }
    html, body { height: 100%; font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; background: var(--marrom); color: var(--text); overflow-x: hidden; }
    #app { min-height: 100dvh; display: flex; flex-direction: column; background: linear-gradient(160deg, #7a3b12 0%, #3d1606 100%); position: relative; overflow: hidden; }
    #app::before { content:''; position:fixed; top:-120px; left:50%; transform:translateX(-50%); width:520px; height:520px; background:radial-gradient(circle, rgba(232,168,62,.13) 0%, transparent 70%); pointer-events:none; z-index:0; }
    .screen { position: relative; z-index: 1; }

    /* Lang bar */
    #lang-bar { position: fixed; top: 12px; right: 14px; z-index: 999; display: flex; gap: 6px; background: rgba(0,0,0,.35); border-radius: 999px; padding: 5px 8px; backdrop-filter: blur(8px); }
    .lang-btn { cursor: pointer; border: none; background: transparent; opacity: .45; transition: opacity .2s, transform .15s; padding: 2px; border-radius: 4px; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; }
    .lang-btn img { width: 28px; height: 20px; border-radius: 3px; display: block; object-fit: cover; }
    .lang-btn.active { opacity: 1; transform: scale(1.15); }
    .lang-btn:active { transform: scale(.95); }

    /* Screens */
    .screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 24px 20px 36px; min-height: 100dvh; animation: fadeUp .45s cubic-bezier(.22,.68,0,1.2) both; }
    .screen.active { display: flex; }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    @keyframes slideLeft { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideRight{ from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:translateX(0); } }
    @keyframes popIn     { from { opacity:0; transform:scale(.7); } to { opacity:1; transform:scale(1); } }
    @keyframes floatUp   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes shimmer   { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes ripple    { 0%{transform:scale(0);opacity:.6} 100%{transform:scale(2.5);opacity:0} }

    /* Logo */
    .logo-wrap { text-align: center; margin-bottom: 20px; margin-top: 16px; animation: fadeUp .5s .1s cubic-bezier(.22,.68,0,1.2) both; }
    .logo-icon { font-size: 64px; line-height: 1; display: block; filter: drop-shadow(0 4px 16px rgba(232,168,62,.5)); animation: floatUp 4s ease-in-out infinite; }
    .logo-name { font-size: 30px; font-weight: 700; letter-spacing: -.5px; color: var(--amarelo); text-shadow: 0 2px 12px rgba(232,168,62,.45), 0 1px 3px rgba(0,0,0,.5); }
    .logo-name span { color: #fff; font-weight: 300; }
    .logo-sub { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 5px; font-style: italic; letter-spacing: .3px; }
    .logo-sm { margin-bottom: 12px; }
    .logo-sm .logo-icon { font-size: 38px; filter: drop-shadow(0 2px 8px rgba(232,168,62,.4)); animation: none; }
    .logo-sm .logo-name { font-size: 21px; font-weight: 700; }

    /* Logo halo (welcome only) */
    .logo-halo { position: relative; display: inline-block; margin-bottom: 6px; }
    .logo-halo::before { content:''; position:absolute; inset:-14px; border-radius:50%; background:radial-gradient(circle, rgba(232,168,62,.22) 0%, transparent 70%); animation: haloPulse 3s ease-in-out infinite; pointer-events:none; }
    @keyframes haloPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }

    /* Card */
    .card { background: var(--creme); border-radius: var(--radius); padding: 24px 20px; width: 100%; max-width: 420px; box-shadow: var(--shadow); margin-bottom: 16px; border-top: 3px solid rgba(232,168,62,.25); animation: fadeUp .4s .15s cubic-bezier(.22,.68,0,1.2) both; transition: transform .2s, box-shadow .2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(92,42,14,.28); }

    /* Context pills */
    .context-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; width: 100%; max-width: 420px; animation: fadeIn .5s .3s both; }
    .ctx-pill { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 999px; padding: 6px 14px; font-size: 13px; color: #fff; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(6px); transition: background .2s, transform .2s; }
    .ctx-pill:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }

    /* Section titles */
    .section-title { font-size: 18px; font-weight: 900; color: var(--marrom); margin-bottom: 5px; line-height: 1.3; letter-spacing: -.2px; }
    .section-hint  { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }

    /* Option grid */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .options-grid.cols-1 { grid-template-columns: 1fr; }
    .opt-btn { background: var(--off); border: 2px solid transparent; border-radius: 14px; padding: 16px 12px; cursor: pointer; text-align: center; transition: all .2s ease; -webkit-tap-highlight-color: transparent; user-select: none; box-shadow: 0 2px 8px rgba(92,42,14,.08); animation: popIn .35s cubic-bezier(.22,.68,0,1.3) both; }
    .opt-btn:active { transform: scale(.95); }
    .opt-btn.selected { border-color: var(--laranja); background: #fde8d3; box-shadow: 0 4px 16px rgba(201,92,30,.25); transform: scale(1.03); }
    .opt-btn .opt-icon  { font-size: 32px; display: block; margin-bottom: 6px; }
    .opt-btn .opt-label { font-size: 14px; font-weight: 700; color: var(--text); }
    .opt-btn .opt-desc  { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Pax 3-option grid */
    .triple-choice { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 4px; }
    .pax-btn { background: var(--off); border: 2px solid transparent; border-radius: 14px; padding: 18px 8px 14px; cursor: pointer; text-align: center; transition: all .2s; -webkit-tap-highlight-color: transparent; box-shadow: 0 2px 8px rgba(92,42,14,.08); }
    .pax-btn:active { transform: scale(.95); }
    .pax-btn.selected { border-color: var(--laranja); background: #fde8d3; box-shadow: 0 4px 16px rgba(201,92,30,.2); }
    .pax-btn .pax-icon  { font-size: 26px; display: block; margin-bottom: 6px; line-height: 1.2; }
    .pax-btn .pax-label { font-size: 13px; font-weight: 800; color: var(--text); }
    .pax-btn .pax-desc  { font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.3; }

    /* Big 2-option buttons (alcohol question) */
    .big-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 4px; }
    .big-opt { background: var(--off); border: 2px solid transparent; border-radius: 16px; padding: 22px 12px 18px; cursor: pointer; text-align: center; transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .big-opt:active { transform: scale(.96); }
    .big-opt.selected { border-color: var(--laranja); background: #fde8d3; }
    .big-opt .big-icon  { font-size: 40px; display: block; margin-bottom: 8px; }
    .big-opt .big-label { font-size: 15px; font-weight: 800; color: var(--text); }
    .big-opt .big-desc  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Drink types (revealed after alcohol choice) */
    #drink-types { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8d9c4; }
    #drink-types .section-title { font-size: 14px; margin-bottom: 12px; }

    /* Buttons */
    .btn-primary { background: linear-gradient(135deg, #d9621e, #a83a0e); color: #fff; border: none; border-radius: 999px; padding: 17px 32px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(201,92,30,.5), 0 1px 0 rgba(255,255,255,.15) inset; transition: transform .15s, box-shadow .15s; -webkit-tap-highlight-color: transparent; letter-spacing: .3px; font-family: 'Poppins', sans-serif; animation: fadeUp .4s .4s both; }
    .btn-primary:active   { transform: scale(.97); box-shadow: 0 2px 8px rgba(201,92,30,.3); }
    .btn-primary:disabled { opacity: .45; pointer-events: none; }
    .btn-primary.pulse { animation: btnPulse 2.2s ease-in-out infinite; }
    @keyframes btnPulse { 0%,100%{box-shadow:0 4px 20px rgba(201,92,30,.5)} 50%{box-shadow:0 6px 32px rgba(201,92,30,.8), 0 0 0 6px rgba(201,92,30,.12)} }
    .btn-secondary { background: transparent; color: rgba(255,255,255,.65); border: 1.5px solid rgba(255,255,255,.25); border-radius: 999px; padding: 11px 24px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; max-width: 420px; margin-top: 8px; transition: background .2s, border-color .2s; -webkit-tap-highlight-color: transparent; font-family: 'Nunito', sans-serif; }
    .btn-secondary:active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.45); }

    /* Welcome */
    .welcome-msg { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; line-height: 1.35; text-shadow: 0 1px 6px rgba(0,0,0,.3); animation: fadeUp .4s .2s both; }
    .welcome-sub { font-size: 14px; font-weight: 400; color: rgba(255,255,255,.68); text-align: center; margin-bottom: 28px; max-width: 300px; line-height: 1.6; animation: fadeUp .4s .3s both; }

    /* Result */
    .suggest-header { text-align: center; margin-bottom: 16px; animation: fadeUp .4s cubic-bezier(.22,.68,0,1.2) both; }
    .suggest-header .big-emoji { font-size: 56px; display:block; filter: drop-shadow(0 4px 16px rgba(232,168,62,.45)); animation: floatUp 3.5s ease-in-out infinite; }
    .suggest-header h2 { font-size: 21px; font-weight: 700; color: var(--amarelo); margin-top: 8px; text-shadow: 0 2px 8px rgba(232,168,62,.3); letter-spacing: -.3px; }
    .suggest-header p  { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.65); margin-top: 4px; }
    .suggest-section-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--laranja); margin: 0 0 12px; }
    .suggest-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(232,168,62,.15); animation: slideLeft .4s cubic-bezier(.22,.68,0,1.2) both; }
    .suggest-item:last-child { border-bottom: none; padding-bottom: 0; }
    .suggest-item:nth-child(1) { animation-delay:.05s; }
    .suggest-item:nth-child(2) { animation-delay:.12s; }
    .suggest-item:nth-child(3) { animation-delay:.19s; }
    .suggest-item:nth-child(4) { animation-delay:.26s; }
    .suggest-item-icon  { font-size: 32px; flex-shrink: 0; margin-top: 1px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.15)); }
    .suggest-item-body  { flex: 1; min-width: 0; }
    .suggest-item-name  { font-size: 15px; font-weight: 800; color: var(--marrom); line-height: 1.25; }
    .suggest-item-desc  { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
    .suggest-item-price { font-size: 13px; font-weight: 900; color: var(--verde); background: rgba(46,107,58,.1); border: 1.5px solid rgba(46,107,58,.25); border-radius: 999px; padding: 3px 10px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
    .badge-champion { display: inline-block; background: linear-gradient(135deg, var(--amarelo), #d4911e); color: var(--marrom); font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .8px; padding: 2px 8px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }
    .badge-new      { display: inline-block; background: linear-gradient(135deg, #3B7A4A, #2a5c37); color: #fff; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .8px; padding: 2px 8px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }

    /* Wine badge */
    .badge-wine { display: inline-block; background: #7b2d8b; color: #fff; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .8px; padding: 2px 7px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }

    /* Reasoning */
    .reasoning-box { background: linear-gradient(135deg, #fff9ef, #fdf3e3); border-left: 4px solid var(--amarelo); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; font-size: 13.5px; font-weight: 400; color: var(--muted); line-height: 1.65; font-style: italic; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(232,168,62,.12); animation: slideRight .45s .05s cubic-bezier(.22,.68,0,1.2) both; }
    .reasoning-box strong { color: var(--laranja); font-style: normal; font-weight: 700; }

    /* Story card */
    .story-card { background: linear-gradient(135deg, #fef6e4, #fdf0d5); border: 1px solid #dfc58a; border-radius: 10px; padding: 10px 12px 10px 36px; margin-top: 10px; font-size: 12px; color: #7a5020; line-height: 1.55; font-style: italic; position: relative; }
    .story-card::before { content: '📖'; font-style: normal; font-size: 16px; position: absolute; left: 10px; top: 10px; }
    .story-card strong { font-style: normal; color: var(--marrom); }

    /* Steps */
    .steps { display: flex; gap: 8px; margin-bottom: 20px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.25); transition: background .3s, width .3s; }
    .step-dot.active { background: var(--amarelo); width: 24px; border-radius: 4px; }
    .step-dot.done   { background: rgba(255,255,255,.5); }

    .footer-note { font-size: 11px; color: rgba(255,255,255,.35); text-align: center; margin-top: 16px; }

    /* Social links */
    .social-row { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:18px; }
    .social-btn { display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.2); border-radius:999px; padding:7px 15px; color:#fff; font-size:13px; font-weight:600; text-decoration:none; transition:background .2s,transform .15s; }
    .social-btn:active { transform:scale(.96); background:rgba(255,255,255,.22); }
    .social-btn svg { width:17px; height:17px; fill:#fff; flex-shrink:0; }
    .social-btn.whatsapp { background:rgba(37,211,102,.25); border-color:rgba(37,211,102,.5); }

    /* Wine CTA on welcome */
    .wine-divider { text-align:center; color:rgba(255,255,255,.35); font-size:12px; letter-spacing:2px; margin:14px 0 10px; }
    .wine-cta-card { display:flex; align-items:center; gap:14px; background:rgba(123,45,139,.18); border:1.5px solid rgba(180,100,210,.4); border-radius:16px; padding:14px 18px; width:100%; max-width:380px; cursor:pointer; text-align:left; transition:all .25s; -webkit-tap-highlight-color:transparent; animation: fadeUp .4s .5s both; }
    .wine-cta-card:hover { background:rgba(123,45,139,.28); border-color:rgba(180,100,210,.7); transform:translateY(-2px); box-shadow:0 8px 24px rgba(123,45,139,.25); }
    .wine-cta-card:active { transform:scale(.97); border-color:rgba(180,100,210,.9); }
    .wine-cta-icon { font-size:30px; flex-shrink:0; }
    .wine-cta-body { flex:1; }
    .wine-cta-title { font-size:14px; font-weight:800; color:#fff; }
    .wine-cta-desc  { font-size:11px; color:rgba(255,255,255,.55); margin-top:3px; }
    .wine-cta-arrow { font-size:20px; color:rgba(255,255,255,.4); flex-shrink:0; }

    /* Wine type grid */
    .wine-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .wine-type-btn  { background:var(--off); border:2px solid transparent; border-radius:14px; padding:16px 8px 14px; cursor:pointer; text-align:center; transition:all .2s; -webkit-tap-highlight-color:transparent; }
    .wine-type-btn:active { transform:scale(.95); }
    .wine-type-btn.selected { border-color:#7b2d8b; background:#f5e8f9; }
    .wine-type-btn .wt-icon  { font-size:30px; display:block; margin-bottom:6px; }
    .wine-type-btn .wt-label { font-size:13px; font-weight:800; color:var(--marrom); display:block; }
    .wine-type-btn .wt-desc  { font-size:10px; color:var(--muted); margin-top:3px; display:block; line-height:1.3; }

    /* Country grid */
    .country-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
    .country-btn  { background:var(--off); border:2px solid transparent; border-radius:12px; padding:12px 6px 10px; cursor:pointer; text-align:center; transition:all .2s; -webkit-tap-highlight-color:transparent; }
    .country-btn:active { transform:scale(.95); }
    .country-btn.selected { border-color:var(--laranja); background:#fde8d3; }
    .country-btn .cc-flag { width:30px; height:auto; border-radius:3px; display:block; margin:0 auto 5px; }
    .country-btn .cc-flag-emoji { font-size:24px; display:block; margin-bottom:5px; }
    .country-btn .cc-label { font-size:10px; font-weight:700; color:var(--marrom); line-height:1.3; display:block; }

    /* Petisco toggle in wine result */
    .petisco-toggle { background:linear-gradient(135deg,#fef6e4,#fdf0d5); border:1.5px solid #dfc58a; border-radius:14px; padding:14px 16px; margin-top:4px; }
    .petisco-question { font-size:13px; font-weight:800; color:var(--marrom); margin-bottom:10px; text-align:center; }
    .petisco-btns { display:flex; gap:10px; }
    .petisco-btn { flex:1; padding:10px 6px; border-radius:12px; border:2px solid #e0ccaa; background:#fff; cursor:pointer; font-size:12px; font-weight:700; color:var(--marrom); transition:all .2s; -webkit-tap-highlight-color:transparent; line-height:1.3; }
    .petisco-btn:active { transform:scale(.95); }
    .petisco-btn.selected { border-color:var(--laranja); background:#fde8d3; }
    .petisco-result { margin-top:12px; }

    /* ── Chat screen ───────────────────────────── */
    #screen-chat { padding:0 0 32px; align-items:stretch; }
    .chat-header { display:flex; align-items:center; gap:12px; padding:14px 20px; background:rgba(0,0,0,.35); backdrop-filter:blur(14px); border-bottom:1px solid rgba(255,255,255,.1); position:sticky; top:0; z-index:10; width:100%; }
    .chat-header-avatar { font-size:28px; filter:drop-shadow(0 2px 6px rgba(232,168,62,.4)); }
    .chat-header-info { flex:1; }
    .chat-header-name { font-size:15px; font-weight:900; color:var(--amarelo); letter-spacing:-.2px; }
    .chat-header-status { font-size:11px; color:rgba(255,255,255,.55); margin-top:1px; display:flex; align-items:center; gap:5px; }
    .chat-header-status::before { content:''; width:6px; height:6px; background:#4caf50; border-radius:50%; display:inline-block; box-shadow:0 0 6px #4caf50; animation:statusBlink 2.5s ease-in-out infinite; }
    @keyframes statusBlink { 0%,100%{opacity:1} 50%{opacity:.5} }
    .chat-body { display:flex; flex-direction:column; align-items:center; padding:20px 16px 8px; width:100%; flex:1; }
    .chat-log { width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
    .chat-bubble { max-width:84%; padding:12px 16px; border-radius:20px; font-size:14px; line-height:1.65; word-break:break-word; animation:fadeUp .3s ease both; }
    .chat-bubble.bot { align-self:flex-start; background:var(--creme); color:var(--text); border-bottom-left-radius:4px; box-shadow:0 3px 12px rgba(92,42,14,.18); }
    .chat-bubble.user { align-self:flex-end; background:linear-gradient(135deg, #d9621e, #b84010); color:#fff; border-bottom-right-radius:4px; font-weight:700; box-shadow:0 3px 12px rgba(201,92,30,.35); }
    .chat-avatar { font-size:15px; margin-bottom:5px; display:block; }
    .chat-opts { display:flex; flex-wrap:wrap; gap:8px; width:100%; max-width:480px; margin-bottom:8px; }
    .chat-opt-btn { background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.3); color:#fff; border-radius:999px; padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; -webkit-tap-highlight-color:transparent; line-height:1.3; font-family:'Poppins',sans-serif; backdrop-filter:blur(6px); animation: popIn .3s cubic-bezier(.22,.68,0,1.3) both; }
    .chat-opt-btn:active { transform:scale(.93); background:rgba(255,255,255,.2); }
    .chat-opt-btn:disabled { opacity:.35; pointer-events:none; }
    .chat-opt-btn.chosen { background:var(--laranja); border-color:var(--laranja); box-shadow:0 3px 14px rgba(201,92,30,.45); }
    .chat-back-btn { width:100%; max-width:480px; }

    .chat-typing span:nth-child(2) { animation-delay:.2s; }
    .chat-typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes typingDot { 0%,80%,100%{transform:scale(.55);opacity:.3} 40%{transform:scale(1);opacity:1} }
    .chat-error { align-self:flex-start; background:#fde8e8; color:#8b2020; border-radius:14px; padding:12px 16px; font-size:13px; display:flex; align-items:center; gap:10px; max-width:90%; }

    .menu-item:nth-child(1){animation-delay:.03s} .menu-item:nth-child(2){animation-delay:.07s} .menu-item:nth-child(3){animation-delay:.11s} .menu-item:nth-child(4){animation-delay:.15s} .menu-item:nth-child(5){animation-delay:.19s} .menu-item:nth-child(6){animation-delay:.23s} .menu-item:nth-child(7){animation-delay:.27s} .menu-item:nth-child(8){animation-delay:.31s}

function getActiveWines() {
  return (state.unit && state.unit.wines === 'outras') ? WINES_OUTRAS : WINES;
}

function pickWines(protein, isCold, isHot) {
  const L = T[state.lang];
  const wineList = getActiveWines();
  let pool = wineList.filter(w => w.pair.includes(protein));
  // Climate override: hot day with red meat? add rosé option
  if (isHot && (protein === 'bode' || protein === 'carne')) {
    const roses = wineList.filter(w => w.type === 'rose' && !pool.find(p => p.name === w.name));
    pool = [...pool, ...roses];
  }
  // Cold night with fish? allow light red
  if (isCold && protein === 'peixe') {
    const light = wineList.filter(w => w.type === 'tinto' && w.country === 'Itália' && !pool.find(p => p.name === w.name));
    pool = [...pool, ...light];
  }
  // Prefer type by temperature
  let sorted;
  if (isCold) {
    // tintos first, then espumante, then branco/rosé
    sorted = [...pool.filter(w => w.type === 'tinto'), ...pool.filter(w => w.type === 'espumante'), ...pool.filter(w => !['tinto','espumante'].includes(w.type))];
  } else if (isHot) {
    // branco/rosé/espumante first, then verde, then tinto
    sorted = [...pool.filter(w => ['branco','rose','espumante','verde'].includes(w.type)), ...pool.filter(w => w.type === 'tinto')];
  } else {
    sorted = pool;
  }
  return sorted.slice(0, 2).map(w => ({
    ...w,
    isWine: true,
    wineType: L['w' + w.type.charAt(0).toUpperCase() + w.type.slice(1)] || w.type,
  }));
}

/* ── CONTEXT ──────────────────────────────────── */
async function loadContext() {
  const now = new Date();
  state.hour = now.getHours();
  console.log('[loadContext] hora local:', state.hour, '| data:', now.toISOString());
  function updateClock() {
    const t = new Date();
    state.hour = t.getHours();
    document.getElementById('ctx-time').textContent =
      t.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit', hour12:false });
  }
  updateClock();
  if (!window._clockInterval) {
    window._clockInterval = setInterval(updateClock, 60000);
  }
  applyTranslations();
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        console.log('[loadContext] GPS obtido:', lat.toFixed(4), lon.toFixed(4));
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=auto`);
        const d = await r.json();
        state.temp = Math.round(d.current.temperature_2m);
        state.isRaining = d.current.weathercode >= 51;
        console.log('[loadContext] clima:', state.temp, 'C | weathercode:', d.current.weathercode, '| chovendo:', state.isRaining);
        const icons = c => c >= 95 ? '⛈️' : c >= 61 ? '🌧️' : c >= 51 ? '🌦️' : c >= 3 ? '☁️' : c >= 1 ? '⛅' : state.temp <= 20 ? '🌙' : '☀️';
        document.getElementById('ctx-weather-icon').textContent = icons(d.current.weathercode);
        document.getElementById('ctx-weather-text').textContent = `${state.temp}°C`;
        document.getElementById('ctx-weather-pill').style.display = 'flex';
        applyTranslations();
      } catch(err) { console.warn('[loadContext] erro clima:', err.message); }
    }, (err) => { console.warn('[loadContext] geolocation negado/erro:', err.message); });
  } else {
    console.warn('[loadContext] geolocation nao suportado');
  }
}

/* ── SUGGESTION ENGINE ────────────────────────── */
function buildSuggestion() {
  const { protein, isRegional, hasAlcohol, drink, temp, hour, isRaining, lang } = state;
  const isCold = temp !== null ? temp <= 22 : (hour >= 19 || hour < 6);
  const isHot  = temp !== null && temp >= 29;
  const L = T[lang];

  // Filter by pax (serving size)
  const isExec  = d => /executivo/i.test(d.desc?.pt || '');
  const isLarge = d => d.price >= 150 || /mistão|pescaria|galeto/i.test(d.name);
  let pool = [...MENU[protein]];
  let paxPool;
  if (state.pax === 1) {
    paxPool = pool.filter(isExec);
    if (!paxPool.length) paxPool = pool.filter(d => d.price <= 75);
  } else if (state.pax === 3) {
    paxPool = pool.filter(isLarge);
    if (!paxPool.length) paxPool = pool.filter(d => !isExec(d));
  } else {
    paxPool = pool.filter(d => !isExec(d));
    if (!paxPool.length) paxPool = pool;
  }
  if (!paxPool.length) paxPool = pool;
  const pickCount = state.pax === 1 ? 1 : 2;

  // Pick dishes respecting regional preference
  let picked;
  if (isRegional === true) {
    const reg = paxPool.filter(d => d.regional);
    picked = (reg.length >= pickCount ? reg : paxPool).slice(0, pickCount);
  } else if (isRegional === false) {
    const intl = paxPool.filter(d => !d.regional);
    picked = (intl.length >= pickCount ? intl : paxPool).slice(0, pickCount);
  } else {
    if (isCold || isRaining) {
      const warm = paxPool.filter(d => /guisado|molho|nata|moqueca/i.test(d.name));
      picked = (warm.length >= pickCount ? warm : paxPool).slice(0, pickCount);
    } else {
      const top = paxPool.filter(d => d.champion || d.isnew);
      picked = (top.length >= pickCount ? top : paxPool).slice(0, pickCount);
    }
  }
  if (!picked || picked.length < 1) picked = pool.slice(0, pickCount);

  // Starter
  const starterPool = STARTERS[protein] || [];
  const starter = starterPool.find(s => s.champion) || starterPool[0];

  // Drinks
  let pickedDrinks;
  if (!hasAlcohol) {
    pickedDrinks = DRINKS.semAlcool.slice(0, 2);
  } else if (drink === 'vinho') {
    pickedDrinks = pickWines(protein, isCold, isHot);
  } else {
    pickedDrinks = (DRINKS[drink] || []).slice(0, 2);
  }

  // Reasoning
  const drinkKey = !hasAlcohol ? 'semAlcool' : drink;
  let reasoning = L.rBase(L.rProtein[protein], L.rDrink[drinkKey] || drinkKey);
  if (isRegional === true)       reasoning += L.rRegional;
  else if (isRegional === false) reasoning += L.rIntl;
  else if (temp !== null) {
    if (isRaining)    reasoning += L.rRain(temp);
    else if (isCold)  reasoning += L.rCold(temp);
    else if (isHot)   reasoning += L.rHot(temp);
    else              reasoning += L.rNice(temp);
  } else {
    if (hour >= 12 && hour < 15) reasoning += L.rLunch;
    else if (hour >= 19)         reasoning += L.rNight;
    else                         reasoning += L.rDefault;
  }
  if (state.pax && L.rPax[state.pax]) reasoning += ' ' + L.rPax[state.pax];
  if (!hasAlcohol) reasoning += ' ' + L.rNoAlcool;

  goTo('screen-result');
  document.getElementById('reasoning-box').innerHTML = reasoning;
  document.getElementById('result-context-line').textContent =
    temp !== null ? L.resultContextWeather(temp) : L.resultContextDefault;
  document.getElementById('result-main-dishes').innerHTML = picked.map(d => renderItem(d, true)).join('');
  if (starter) {
    document.getElementById('card-entrada').style.display = 'block';
    document.getElementById('result-starters').innerHTML = renderItem(starter, false);
  }
  document.getElementById('result-drinks').innerHTML = pickedDrinks.map(d => renderItem(d, false)).join('');
}

function renderItem(item, showStory) {
  const L = T[state.lang];
  const desc = typeof item.desc === 'object' ? item.desc[state.lang] : (item.desc || '');
  const bc = item.champion ? `<span class="badge-champion">${L.badgeChampion}</span>` : '';
  const bn = item.isnew    ? `<span class="badge-new">${L.badgeNew}</span>` : '';
  const bw = item.isWine   ? `<span class="badge-wine">${item.wineType}</span>` : '';
  const story = (showStory && item.storyId && STORIES[item.storyId])
    ? `<div class="story-card">${STORIES[item.storyId][state.lang]}</div>` : '';
  return `
    <div class="suggest-item">
      <div class="suggest-item-icon">${item.icon}</div>
      <div class="suggest-item-body">
        <div class="suggest-item-name">${item.name}${bc}${bn}${bw}</div>
        <div class="suggest-item-desc">${desc}</div>
        ${story}
      </div>
      <div class="suggest-item-price">R$ ${item.price}</div>
    </div>`;
}

function buildWineSuggestion() {
  const L = T[state.lang];
  const { type, country } = wineState;

  // Filter wines by type (branco includes verde)
  let pool = [...getActiveWines()];
  if (type === 'branco') pool = pool.filter(w => w.type === 'branco' || w.type === 'verde');
  else if (type) pool = pool.filter(w => w.type === type);

  // Filter by sweetness
  const { sweetness } = wineState;
  if (sweetness && sweetness !== 'qualquer') {
    const bySweetness = pool.filter(w => w.sweetness === sweetness);
    if (bySweetness.length) pool = bySweetness;
  }

  // Filter by country
  if (country && country !== 'qualquer') {
    const byCountry = pool.filter(w => w.country === country);
    if (byCountry.length) pool = byCountry;
    // else keep sweetness-filtered pool (graceful fallback)
  }

  const picked = pool.slice(0, 2);

  // Petisco pairing by wine type
  const petiscoPool = (type === 'tinto')
    ? [STARTERS.bode[0], STARTERS.carne[0]]
    : [STARTERS.peixe[0], STARTERS.peixe[1] || STARTERS.frango[1]];

  // Render
  goTo('screen-wine-result');
  const typeLabel = L['w' + type.charAt(0).toUpperCase() + type.slice(1)] || type;
  const countryLabel = (country && country !== 'qualquer') ? country : null;
  document.getElementById('wine-reasoning-box').innerHTML = L.wineReasoning(typeLabel, countryLabel);
  s('wine-result-title', L.wineResultTitle);
  s('wine-result-label', L.wineResultLabel);
  document.getElementById('wine-result-items').innerHTML = picked.map(w => renderItem(
    { ...w, isWine:true, wineType: L['w'+w.type.charAt(0).toUpperCase()+w.type.slice(1)] || w.type }, false
  )).join('');
  s('petisco-question', L.petiscoQuestion);
  s('btn-petisco-yes', L.petiscoYes);
  s('btn-petisco-no',  L.petiscoNo);
  document.getElementById('petisco-result-items').innerHTML =
    '<div class="suggest-section-label">' + L.petiscoLabel + '</div>' +
    petiscoPool.filter(Boolean).map(p => renderItem(p, false)).join('');
  document.getElementById('petisco-result-items').style.display = 'none';
  document.querySelectorAll('.petisco-btn').forEach(b => b.classList.remove('selected'));
  s('btn-wine-restart', L.btnWineRestart);
}

function showPetisco(yes) {
  document.querySelectorAll('.petisco-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(yes ? 'btn-petisco-yes' : 'btn-petisco-no').classList.add('selected');
  document.getElementById('petisco-result-items').style.display = yes ? 'block' : 'none';
}

function resetWineFlow() {
  wineState.type = null; wineState.sweetness = null; wineState.country = null;
  document.querySelectorAll('#screen-wine-type .wine-type-btn, #screen-wine-sweet .wine-type-btn, #screen-wine-country .country-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-wt-next').disabled = true;
  document.getElementById('btn-ws-next').disabled = true;
  document.getElementById('btn-wc-next').disabled = true;
  goTo('screen-welcome');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function callClaude(userMessage) {
  if (userMessage !== null) {
    chatHistory.push({ role:'user', content: userMessage });
  }
  const payload = {
    model: CLAUDE_MODEL,
    max_tokens: 600,
    system: buildSystemPrompt(),
    messages: chatHistory,
  };
  console.log('[callClaude] enviando', chatHistory.length, 'mensagem(ns) | system prompt:', payload.system.length, 'chars | model:', payload.model);
  console.log('[callClaude] historico:', JSON.stringify(chatHistory.map(m => ({ role: m.role, len: m.content.length }))));
  const resp = await fetch(CLAUDE_API_ENDPOINT, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) {
    const errText = await resp.text();
    console.error('[Claude] erro', resp.status, errText);
    throw new Error(`HTTP ${resp.status}: ${errText}`);
  }
  const data = await resp.json();
  const raw = data.content[0].text.trim();
  console.log('[Claude] resposta bruta:', raw);
  chatHistory.push({ role:'assistant', content: raw });
  const jsonStr = raw.replace(/^```json?\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(jsonStr);
}

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
}

function findItem(name) {
  const n = normalize(name);

  // exact then fuzzy for MENU
  for (const cat of Object.values(MENU)) {
    for (const d of cat) {
      if (d.name === name || normalize(d.name) === n) { console.log('[findItem] MENU exato:', name); return { ...d }; }
    }
  }
  // partial match MENU
  for (const cat of Object.values(MENU)) {
    for (const d of cat) {
      const dn = normalize(d.name);
      if (dn.includes(n) || n.includes(dn)) { console.log('[findItem] MENU parcial:', name, '->', d.name); return { ...d }; }
    }
  }

  // WINES
  for (const w of WINES) {
    if (w.name === name || normalize(w.name) === n) {
      console.log('[findItem] WINE exato:', name);
      const L = T[state.lang];
      return { ...w, isWine:true, wineType: L['w'+w.type.charAt(0).toUpperCase()+w.type.slice(1)] || w.type };
    }
  }
  for (const w of WINES) {
    const wn = normalize(w.name);
    if (wn.includes(n) || n.includes(wn)) {
      console.log('[findItem] WINE parcial:', name, '->', w.name);
      const L = T[state.lang];
      return { ...w, isWine:true, wineType: L['w'+w.type.charAt(0).toUpperCase()+w.type.slice(1)] || w.type };
    }
  }

  // DRINKS
  for (const cat of Object.values(DRINKS))
    for (const d of cat)
      if (d.name === name || normalize(d.name) === n) { console.log('[findItem] DRINK exato:', name); return { ...d }; }
  for (const cat of Object.values(DRINKS))
    for (const d of cat) {
      const dn = normalize(d.name);
      if (dn.includes(n) || n.includes(dn)) { console.log('[findItem] DRINK parcial:', name, '->', d.name); return { ...d }; }
    }

  // STARTERS
  for (const cat of Object.values(STARTERS))
    for (const d of cat)
      if (d.name === name || normalize(d.name) === n) { console.log('[findItem] STARTER exato:', name); return { ...d }; }
  for (const cat of Object.values(STARTERS))
    for (const d of cat) {
      const dn = normalize(d.name);
      if (dn.includes(n) || n.includes(dn)) { console.log('[findItem] STARTER parcial:', name, '->', d.name); return { ...d }; }
    }

  // Fallback: mapeia itens comuns fora do cardápio para equivalentes reais
  const fallbacks = {
    'agua':           'Suco Natural',
    'agua mineral':   'Suco Natural',
    'agua com gas':   'Suco Natural',
    'refrigerante':   'Suco Natural',
    'coca':           'Suco Natural',
    'coca-cola':      'Suco Natural',
    'guarana':        'Suco Natural',
    'soda':           'Suco Natural',
    'limonada':       'Caipirinha',
    'cerveja':        'Cerveja Brahma Duplo Malte 350ml',
    'chopp':          'Chopp Brahma',
  };
  const fallbackName = fallbacks[n] || fallbacks[n.split(' ')[0]];
  if (fallbackName) {
    console.warn('[findItem] fallback:', name, '\u2192', fallbackName);
    return findItem(fallbackName);
  }

  console.warn('[findItem] não encontrado:', name);
  return null;
}

function handleRecommendation(data) {
  console.log('[handleRecommendation] JSON completo:', JSON.stringify(data));
  console.log('[handleRecommendation] dishes:', data.dishes, '| starter:', data.starter, '| drinks:', data.drinks);
  const L = T[state.lang];
  document.getElementById('reasoning-box').innerHTML = mdToHtml(data.message);
  s('result-title', L.resultTitle);
  document.getElementById('result-context-line').textContent =
    state.temp !== null ? L.resultContextWeather(state.temp) : L.resultContextDefault;

  const pax = parseInt(data.pax) || 1;

  // Client-side safety: if pax=1 and Claude suggested a large dish (>R$100), swap it for an executive dish
  let dishNames = [...new Set(data.dishes || [])];
  if (pax === 1) {
    const category = data.category || 'bode';
    const catItems = MENU[category] || [];
    const execPool = catItems.filter(d => /executivo/i.test(d.desc?.pt || ''));
    dishNames = dishNames.map(name => {
      const item = findItem(name);
      if (item && item.price > 100 && execPool.length) {
        const fallback = execPool[Math.floor(Math.random() * execPool.length)];
        console.log('[handleRecommendation] pax=1 swap:', name, '->', fallback.name);
        return fallback.name;
      }
      return name;
    });
  }

  const uniqueDishes = [...new Set(dishNames)];
  const dishItems = uniqueDishes.map(n => { const item = findItem(n); console.log('[handleRecommendation] dish', JSON.stringify(n), '->', item ? item.name : 'NAO ENCONTRADO'); return item; }).filter(Boolean);
  console.log('[handleRecommendation] pratos resolvidos:', dishItems.length, 'de', (data.dishes||[]).length);
  s('label-main-dish', L.labelMainDish);
  document.getElementById('result-main-dishes').innerHTML = dishItems.map(d => renderItem(d, true)).join('');

  const starterItem = data.starter ? findItem(data.starter) : null;
  console.log('[handleRecommendation] entrada:', data.starter, '->', starterItem ? starterItem.name : 'NAO ENCONTRADO');
  if (starterItem) {
    document.getElementById('card-entrada').style.display = 'block';
    s('label-starter', L.labelStarter);
    document.getElementById('result-starters').innerHTML = renderItem(starterItem, false);
  } else {
    document.getElementById('card-entrada').style.display = 'none';
  }

  const drinkItems = (data.drinks || []).map(n => { const item = findItem(n); console.log('[handleRecommendation] drink', JSON.stringify(n), '->', item ? item.name : 'NAO ENCONTRADO'); return item; }).filter(Boolean);
  console.log('[handleRecommendation] bebidas resolvidas:', drinkItems.length, 'de', (data.drinks||[]).length);
  s('label-drink', L.labelDrink);
  document.getElementById('result-drinks').innerHTML = drinkItems.map(d => renderItem(d, false)).join('');

  // Outras opções da mesma categoria, filtradas por pax
  const category = data.category;
  const cardOther = document.getElementById('card-other-options');
  if (category && MENU[category]) {
    const suggestedNorm = (data.dishes || []).map(normalize);
    const pool = MENU[category].filter(d => !suggestedNorm.includes(normalize(d.name)));
    let others = pool;
    if (pax === 1) {
      others = pool.filter(d => /executivo/i.test(d.desc?.pt || '') || d.price <= 79);
    } else if (pax === 2) {
      others = pool.filter(d => /executivo/i.test(d.desc?.pt || '') || d.price <= 155);
    }
    // pax >= 3: mostra tudo
    console.log('[handleRecommendation] outras opcoes category:', category, '| pax:', pax, '| total:', others.length);
    if (others.length > 0) {
      const catLabel = (L.rProtein && L.rProtein[category]) || category;
      s('label-other-options', L.labelOtherOptions(catLabel));
      document.getElementById('result-other-dishes').innerHTML = others.map(d => renderItem(d, false)).join('');
      cardOther.style.display = 'block';
    } else {
      cardOther.style.display = 'none';
    }
  } else {
    cardOther.style.display = 'none';
  }

  s('btn-restart', L.btnRestart);
  const fr = document.getElementById('footer-result');
  if (fr) fr.innerHTML = L.footerResult.replace('\n','<br><strong style="color:rgba(255,255,255,.5)">') + '</strong>';

  goTo('screen-result');
}

async function userTapped(option) {
  console.log('[userTapped] opção escolhida:', option, '| turno:', chatHistory.length);
  document.querySelectorAll('.chat-opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === option) b.classList.add('chosen');
  });
  clearOptions();
  addUserBubble(option);
  showTypingIndicator();
  try {
    const data = await callClaude(option);
    hideTypingIndicator();
    console.log('[userTapped] resposta type:', data.type, data.type === 'question' ? '| options:' + JSON.stringify(data.options) : '| dishes:' + JSON.stringify(data.dishes));
    if (data.type === 'recommendation') {
      addBotBubble(data.message);
      setTimeout(() => handleRecommendation(data), 1400);
    } else {
      addBotBubble(data.message);
      renderChatOptions(data.options);
    }
  } catch(e) {
    console.error('[userTapped] erro ao chamar Claude:', e);
    showChatError(() => userTapped(option));
  }
}

async function startChat() {
  console.log('[startChat] iniciando chat — lang:', state.lang, '| hora:', state.hour, '| temp:', state.temp, '| chovendo:', state.isRaining);
  goTo('screen-chat');
  chatHistory = [];
  document.getElementById('chat-log').innerHTML = '';
  clearOptions();
  showTypingIndicator();
  // Anthropic API exige pelo menos 1 mensagem — usamos contexto invisível para iniciar
  const starters = { pt:'Olá! Acabei de chegar no restaurante.', en:'Hi! I just arrived at the restaurant.', es:'Hola! Acabo de llegar al restaurante.' };
  const starter = starters[state.lang] || starters.pt;
  console.log('[startChat] mensagem inicial injetada:', starter);
  chatHistory.push({ role:'user', content: starter });
  try {
    const data = await callClaude(null);
    hideTypingIndicator();
    console.log('[startChat] resposta inicial recebida. type:', data.type, '| options:', data.options);
    addBotBubble(data.message);
    renderChatOptions(data.options);
  } catch(e) {
    console.error('[startChat] erro:', e);
    showChatError(startChat);
  }
}

function clearChatState() {
  chatHistory = [];
  const log = document.getElementById('chat-log');
  if (log) log.innerHTML = '';
  clearOptions();
}

function resetChat() {
  clearChatState();
  goTo('screen-welcome');
}

/* ── CARDÁPIO COMPLETO ────────────────────────── */
let currentMenuTab = 'pratos';

function openMenuScreen() {
  goTo('screen-menu');
  const L = T[state.lang];
  document.getElementById('menu-topbar-title').textContent = L.menuTopbarTitle;
  document.getElementById('menu-back-btn').textContent = L.menuBack;
  const tabMap = {
    destaques: L.tabDestaques, bode: L.tabBode, carnes: L.tabCarnes, mar: L.tabMar, aves: L.tabAves,
    entradas: L.tabEntradas, caldos: L.tabCaldos, petiscos: L.tabPetiscos,
    saladas: L.tabSaladas, sobremesas: L.tabSobremesas, bodinhos: L.tabBodinhos,
    bebidas: L.tabBebidas, vinhos: L.tabVinhos,
  };
  for (const [key, label] of Object.entries(tabMap)) {
    const el = document.getElementById('tab-' + key + '-label');
    if (el) el.textContent = label;
  }
  const pizzaTab = document.getElementById('menu-tab-pizza');
  if (pizzaTab) pizzaTab.style.display = (state.unit && state.unit.hasPizza) ? '' : 'none';
  document.querySelectorAll('.menu-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  currentMenuTab = 'destaques';
  renderMenuTab('destaques');
}

function switchMenuTab(tab, el) {
  currentMenuTab = tab;
  document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderMenuTab(tab);
}

function renderMenuTab(tab) {
  const L = T[state.lang];
  const body = document.getElementById('menu-body');
  body.innerHTML = '';

  function addSection(label, items, isWine) {
    if (!items || !items.length) return;
    const sec = document.createElement('div');
    sec.className = 'menu-section';
    sec.innerHTML = `<div class="menu-section-title">${label}</div>`;
    items.forEach(d => sec.appendChild(isWine ? buildWineMenuItem(d) : buildMenuItem(d, false)));
    body.appendChild(sec);
  }

  if (tab === 'destaques') {
    // collect all champion items
    const champions = [];
    for (const cat of Object.values(MENU)) champions.push(...cat.filter(d => d.champion));
    for (const cat of Object.values(STARTERS)) champions.push(...cat.filter(d => d.champion));
    for (const cat of Object.values(PETISCOS)) champions.push(...cat.filter(d => d.champion));
    addSection('⭐ ' + L.tabDestaques, champions);
    // new items
    const novos = [];
    for (const cat of Object.values(MENU)) novos.push(...cat.filter(d => d.isnew));
    for (const cat of Object.values(DRINKS)) novos.push(...cat.filter(d => d.isnew));
    if (novos.length) addSection('✨ Novidades', novos);

  } else if (tab === 'bode') {
    addSection(L.menuCatBode, MENU.bode);

  } else if (tab === 'carnes') {
    addSection(L.menuCatCarne, MENU.carne);

  } else if (tab === 'mar') {
    addSection(L.menuCatPeixe, MENU.peixe);

  } else if (tab === 'aves') {
    addSection(L.menuCatFrango, MENU.frango);

  } else if (tab === 'entradas') {
    addSection(L.menuCatBode,   STARTERS.bode);
    addSection(L.menuCatCarne,  STARTERS.carne);
    addSection(L.menuCatPeixe,  STARTERS.peixe);
    addSection(L.menuCatFrango, STARTERS.frango);

  } else if (tab === 'caldos') {
    addSection('🫕 Caldos', CALDOS);

  } else if (tab === 'petiscos') {
    addSection(L.menuCatMatuto, PETISCOS.matuto);
    addSection(L.menuCatChapa,  PETISCOS.chapa);

  } else if (tab === 'saladas') {
    addSection('🥗 Saladas', SALADAS);

  } else if (tab === 'sobremesas') {
    addSection('🍰 Sobremesas', SOBREMESAS);

  } else if (tab === 'bodinhos') {
    addSection('👶 Para os Bodinhos', BODINHOS);

  } else if (tab === 'bebidas') {
    addSection(L.menuCatDrinkChopp,    DRINKS.chopp);
    addSection(L.menuCatDrinkCerveja,  DRINKS.cerveja);
    addSection(L.menuCatDrinkDrink,    DRINKS.drink);
    addSection(L.menuCatDrinkGin,      DRINKS.gin);
    addSection(L.menuCatDrinkWhisky,   DRINKS.whisky);
    addSection(L.menuCatDrinkCachaca,  DRINKS.cachaca);
    addSection(L.menuCatDrinkSemAlcool,DRINKS.semAlcool);

  } else if (tab === 'vinhos') {
    const typeMap = { tinto:L.menuWineTinto, branco:L.menuWineBranco, rose:L.menuWineRose, espumante:L.menuWineEspumante, verde:L.menuWineVerde };
    const wByType = {};
    getActiveWines().forEach(w => { if (!wByType[w.type]) wByType[w.type] = []; wByType[w.type].push(w); });
    for (const [type, label] of Object.entries(typeMap)) {
      addSection(label, wByType[type] || [], true);
    }

  } else if (tab === 'pizza') {
    addSection('🍕 Tradicionais (37cm)', PIZZA.tradicionais);
    addSection('⭐ Especiais (37cm)',     PIZZA.especiais);
    addSection('👤 Individuais (25cm)',   PIZZA.individuais);
    addSection('🍫 Pizzas Doces',         PIZZA.doces);
  }
}

function buildMenuItem(d, _big) {
  const L = T[state.lang];
  const desc = d.desc?.[state.lang] || d.desc?.pt || '';
  const el = document.createElement('div');
  el.className = 'menu-item';
  let badges = '';
  if (d.champion) badges += `<span class="menu-badge-champ">⭐ ${L.badgeChampion||'Campeão'}</span>`;
  if (d.isnew)    badges += `<span class="menu-badge-new">✨ Novo</span>`;
  if (d.regional) badges += `<span class="menu-badge-reg">🌵 Regional</span>`;
  el.innerHTML = `
    <div class="menu-item-icon">${d.icon || '🍽️'}</div>
    <div class="menu-item-body">
      <div class="menu-item-name">${d.name}${badges}</div>
      <div class="menu-item-desc">${desc}</div>
    </div>
    <div class="menu-item-price">R$${d.price}</div>`;
  return el;
}

function buildWineMenuItem(w) {
  const L = T[state.lang];
  const desc = w.desc?.[state.lang] || w.desc?.pt || '';
  const sweetBadge = w.sweetness === 'seco'
    ? `<span class="menu-badge-sec">🍷 Seco</span>`
    : w.sweetness === 'suave'
    ? `<span class="menu-badge-suave">🍬 Suave</span>`
    : '';
  const el = document.createElement('div');
  el.className = 'menu-item menu-wine-item';
  el.innerHTML = `
    <div class="menu-item-icon">${w.icon || '🍷'}</div>
    <div class="menu-item-body">
      <div class="menu-item-name">${w.name}${sweetBadge}</div>
      <div class="menu-wine-grape">${w.country} · ${w.grape}</div>
      <div class="menu-item-desc">${desc}</div>
      <div class="menu-wine-pair">🍽️ ${L.pairLabel||'Harmoniza'}: ${w.pair.map(p => L.rProtein[p] || p).join(', ')}</div>
    </div>
    <div class="menu-item-price">R$${w.price}</div>`;
  return el;
}
